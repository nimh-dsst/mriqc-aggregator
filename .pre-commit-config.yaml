minimum_pre_commit_version: "4.0.0"
default_install_hook_types:
  - pre-commit
  - pre-push

repos:
  - repo: local
    hooks:
      - id: ruff-check
        name: ruff check
        entry: pixi run lint
        language: system
        pass_filenames: false
        always_run: true
      - id: ruff-format
        name: ruff format --check
        entry: pixi run format-check
        language: system
        pass_filenames: false
        always_run: true
      - id: frontend-lint
        name: frontend lint
        entry: npm --prefix frontend run lint
        language: system
        pass_filenames: false
        always_run: true
      - id: python-tests
        name: python tests
        entry: pixi run test
        language: system
        pass_filenames: false
        always_run: true
        stages: [pre-push]
