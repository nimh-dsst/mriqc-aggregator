services:
  postgres:
    ports:
      - "${POSTGRES_PORT:-5432}:5432"

  api:
    ports:
      - "${API_PORT:-8000}:8000"

  frontend:
    image: node:22-alpine
    working_dir: /frontend
    command:
      - sh
      - -lc
      - npm ci && npm run dev -- --host 0.0.0.0 --port ${FRONTEND_PORT:-5173}
    environment:
      VITE_DEV_PROXY_TARGET: http://api:8000
    depends_on:
      api:
        condition: service_healthy
    ports:
      - "${FRONTEND_PORT:-5173}:5173"
    volumes:
      - ./frontend:/frontend
      - frontend-node-modules:/frontend/node_modules

volumes:
  frontend-node-modules:
