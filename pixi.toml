[workspace]
channels = ["conda-forge"]
platforms = ["osx-arm64", "osx-64", "linux-64"]

[dependencies]
python = ">=3.11,<3.14"
pytest = ">=8.3,<9"
ruff = ">=0.11,<0.12"

[pypi-dependencies]
mriqc-aggregator = { path = ".", editable = true }
httpx = ">=0.27,<0.29"

[tasks]
pull-sample = "python scripts/pull_representative_sample.py"
test = "pytest -q"
lint = "ruff check ."
format = "ruff format ."

